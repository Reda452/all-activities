<!DOCTYPE html>
<html lang="en">

<head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Pro Shop</title>

                <style>
                                body {
                                                font-family: Arial, sans-serif;
                                                margin: 0;
                                                background: #f5f5f5;
                                }

                                header {
                                                background: #111;
                                                color: white;
                                                padding: 15px 30px;
                                                display: flex;
                                                justify-content: space-between;
                                                align-items: center;
                                }

                                .cart {
                                                background: #0066ff;
                                                padding: 10px 15px;
                                                border-radius: 5px;
                                }

                                .products {
                                                display: grid;
                                                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                                                gap: 20px;
                                                padding: 40px;
                                }

                                .product {
                                                background: white;
                                                padding: 20px;
                                                border-radius: 10px;
                                                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
                                                text-align: center;
                                }

                                .product img {
                                                width: 100%;
                                                height: 200px;
                                                object-fit: cover;
                                                border-radius: 8px;
                                }

                                button {
                                                background: #0066ff;
                                                color: white;
                                                border: none;
                                                padding: 10px 15px;
                                                border-radius: 5px;
                                                cursor: pointer;
                                }

                                #cartPanel {
                                                position: fixed;
                                                right: 0;
                                                top: 0;
                                                width: 350px;
                                                height: 100%;
                                                background: white;
                                                box-shadow: -5px 0 15px rgba(0, 0, 0, 0.2);
                                                padding: 20px;
                                                overflow-y: auto;
                                                display: none;
                                }

                                .cart-item {
                                                border-bottom: 1px solid #ddd;
                                                padding: 10px 0;
                                }
                </style>
</head>

<body>

                <header>
                                <h2>My Online Store</h2>

                                <div class="cart">
                                                🛒 Cart:
                                                <span id="cartCount">0</span>
                                                <button onclick="toggleCart()">View</button>
                                </div>
                </header>

                <div class="products">

                                <div class="product">
                                                <img src="" alt="">
                                                <h3>Laptop Pro</h3>
                                                <p>$999</p>
                                                <button onclick="addToCart('Laptop Pro',999)">
                                                                Add to Cart
                                                </button>
                                </div>

                                <div class="product">
                                                <img src="https://via.placeholder.com/300x200" alt="">
                                                <h3>Gaming Mouse</h3>
                                                <p>$49</p>
                                                <button onclick="addToCart('Gaming Mouse',49)">
                                                                Add to Cart
                                                </button>
                                </div>

                                <div class="product">
                                                <img src="https://via.placeholder.com/300x200" alt="">
                                                <h3>Mechanical Keyboard</h3>
                                                <p>$89</p>
                                                <button onclick="addToCart('Mechanical Keyboard',89)">
                                                                Add to Cart
                                                </button>
                                </div>

                                <div class="product">
                                                <img src="https://via.placeholder.com/300x200" alt="">
                                                <h3>4K Monitor</h3>
                                                <p>$299</p>
                                                <button onclick="addToCart('4K Monitor',299)">
                                                                Add to Cart
                                                </button>
                                </div>

                                <div class="product">
                                                <img src="https://via.placeholder.com/300x200" alt="">
                                                <h3>Smartphone</h3>
                                                <p>$699</p>
                                                <button onclick="addToCart('Smartphone',699)">
                                                                Add to Cart
                                                </button>
                                </div>

                                <div class="product">
                                                <img src="https://via.placeholder.com/300x200" alt="">
                                                <h3>Wireless Headphones</h3>
                                                <p>$129</p>
                                                <button onclick="addToCart('Wireless Headphones',129)">
                                                                Add to Cart
                                                </button>
                                </div>

                </div>

                <div id="cartPanel">
                                <h2>Shopping Cart</h2>

                                <div id="cartItems"></div>

                                <h3>Total: $<span id="total">0</span></h3>

                                <button onclick="checkout()">
                                                Checkout
                                </button>
                </div>

                <script>

                                let cart = [];

                                function addToCart(name, price) {

                                                cart.push({
                                                                name: name,
                                                                price: price
                                                });

                                                updateCart();
                                }

                                function updateCart() {

                                                document.getElementById("cartCount")
                                                                .innerText = cart.length;

                                                let html = "";
                                                let total = 0;

                                                cart.forEach(item => {

                                                                total += item.price;

                                                                html += `
            <div class="cart-item">
                <strong>${item.name}</strong><br>
                $${item.price}
            </div>
        `;
                                                });

                                                document.getElementById("cartItems")
                                                                .innerHTML = html;

                                                document.getElementById("total")
                                                                .innerText = total;
                                }

                                function toggleCart() {

                                                const panel =
                                                                document.getElementById("cartPanel");

                                                panel.style.display =
                                                                panel.style.display === "block"
                                                                                ? "none"
                                                                                : "block";
                                }

                                function checkout() {

                                                if (cart.length === 0) {
                                                                alert("Your cart is empty.");
                                                                return;
                                                }

                                                alert("Checkout complete!");

                                                cart = [];

                                                updateCart();
                                }

                </script>

</body>

</html>
